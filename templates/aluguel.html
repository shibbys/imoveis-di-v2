{% extends "base.html" %}
{% block title %}Aluguel — Imoveis DI{% endblock %}
{% block content %}
<div class="flex flex-col h-full">
  <div id="review-banner-container" class="shrink-0 px-4 pt-3">
    {% include "partials/_review_banner.html" %}
  </div>
  <div class="flex gap-3 flex-1 overflow-hidden min-h-0 px-4 pb-4 pt-3">
    <!-- Filtros -->
    <aside id="filter-panel" class="w-52 shrink-0 flex flex-col overflow-hidden" data-collapsed="false">
      <div class="flex justify-end pb-1 shrink-0">
        <button onclick="toggleFilterPanel()"
                title="Recolher/expandir filtros"
                class="w-8 h-8 flex items-center justify-center rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
          <svg id="filter-chevron" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
      </div>
      <div id="filter-content" class="flex flex-col gap-2 overflow-y-auto flex-1 min-h-0">
        {% set tipo = "aluguel" %}
        {% include "partials/_filters.html" %}
        <!-- Mapa de bairros (referência estática) -->
        <details class="border border-gray-200 rounded-lg overflow-hidden" open>
          <summary class="px-2 py-1.5 text-xs font-medium text-gray-600 cursor-pointer bg-gray-50 hover:bg-gray-100 select-none">
            Mapa dos bairros
          </summary>
          <img src="/static/bairros-di.png"
               class="w-full block cursor-zoom-in"
               alt="Mapa dos bairros de Dois Irmãos"
               onclick="document.getElementById('bairros-fullscreen').showModal()">
        </details>
      </div>
    </aside>
    <!-- Tabela -->
    <div class="flex-1 min-w-0 overflow-y-auto rounded-lg border border-gray-200 bg-white">
      <div id="tabela-container"
           hx-get="/partials/imoveis?tipo=aluguel&status=Novo"
           hx-trigger="load"
           hx-target="#tabela-container"
           hx-swap="innerHTML"
           class="min-h-full">
        <p class="text-gray-400 text-sm p-4">Carregando...</p>
      </div>
    </div>
    <!-- Detalhe -->
    <aside class="w-96 shrink-0 overflow-y-auto hidden" id="detalhe-panel"></aside>
  </div>
</div>
{% endblock %}
