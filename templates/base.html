<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Imoveis DI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
  <script src="/static/app.js" defer></script>
</head>
<body class="h-full flex flex-col bg-gray-50 text-gray-900 overflow-hidden">

  <nav class="shrink-0 bg-white border-b border-gray-200 px-4 py-0 flex items-center gap-0.5 h-12">
    <!-- Brand -->
    <span class="mr-3 flex items-center gap-1.5 text-blue-600 font-bold text-sm select-none">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      Imóveis DI
    </span>
    <div class="w-px h-5 bg-gray-200 mr-2"></div>
    <a href="/aluguel"
       class="flex items-center gap-1.5 px-3 h-12 text-sm font-medium border-b-2 transition-colors
              {% if active_tab == 'aluguel' %}border-blue-600 text-blue-600{% else %}border-transparent text-gray-500 hover:text-gray-900 hover:border-gray-300{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/>
      </svg>
      Aluguel
    </a>
    <a href="/compra"
       class="flex items-center gap-1.5 px-3 h-12 text-sm font-medium border-b-2 transition-colors
              {% if active_tab == 'compra' %}border-blue-600 text-blue-600{% else %}border-transparent text-gray-500 hover:text-gray-900 hover:border-gray-300{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
      </svg>
      Compra
    </a>
    <a href="/mapa"
       class="flex items-center gap-1.5 px-3 h-12 text-sm font-medium border-b-2 transition-colors
              {% if active_tab == 'mapa' %}border-blue-600 text-blue-600{% else %}border-transparent text-gray-500 hover:text-gray-900 hover:border-gray-300{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
      </svg>
      Mapa
    </a>
    <a href="/historico"
       class="flex items-center gap-1.5 px-3 h-12 text-sm font-medium border-b-2 transition-colors
              {% if active_tab == 'historico' %}border-blue-600 text-blue-600{% else %}border-transparent text-gray-500 hover:text-gray-900 hover:border-gray-300{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      Histórico
    </a>
    <a href="/configuracoes"
       class="flex items-center gap-1.5 px-3 h-12 text-sm font-medium border-b-2 transition-colors
              {% if active_tab == 'configuracoes' %}border-blue-600 text-blue-600{% else %}border-transparent text-gray-500 hover:text-gray-900 hover:border-gray-300{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Configurações
    </a>

    <div class="ml-auto flex items-center gap-3 text-sm text-gray-500">
      <span class="font-medium text-gray-700">{{ username }}</span>
      <form method="post" action="/logout">
        <button class="flex items-center gap-1 text-gray-400 hover:text-red-500 transition-colors text-xs">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sair
        </button>
      </form>
    </div>
  </nav>

  <main class="flex-1 overflow-auto min-h-0">
    {% block content %}{% endblock %}
  </main>

  <script>
    // Re-aplica filtros quando um status é alterado via quick-action ou dropdown da tabela
    document.body.addEventListener('imovelStatusChanged', function () {
      var form = document.getElementById('filter-form');
      if (form) form.requestSubmit();
    });
  </script>

</body>
</html>
