<div class="bg-white rounded-lg border border-gray-200 p-4 text-sm">
  <div class="flex items-center justify-between mb-4">
    <h3 class="font-semibold text-gray-900">Editar imóvel</h3>
    <button hx-get="/partials/imovel/{{ imovel.id }}"
            hx-target="#detalhe-panel"
            hx-swap="innerHTML"
            class="text-gray-400 hover:text-gray-600">✕</button>
  </div>

  <form hx-post="/partials/imovel/{{ imovel.id }}/edit"
        hx-target="#detalhe-panel"
        hx-swap="innerHTML"
        class="space-y-3">
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Endereço completo</label>
      <input type="text" name="address" value="{{ imovel.address or '' }}"
             placeholder="Ex: Rua das Flores, 123, Centro, Dois Irmãos"
             class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm focus:ring-1 focus:ring-blue-400 focus:outline-none">
      <p class="text-xs text-gray-400 mt-0.5">Será geocodificado automaticamente via OpenStreetMap</p>
    </div>

    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">URL do Google Maps (opcional, para coordenadas precisas)</label>
      <input type="text" name="gmaps_url"
             placeholder="Cole aqui o link compartilhado do Google Maps"
             class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm focus:ring-1 focus:ring-blue-400 focus:outline-none">
      <p class="text-xs text-gray-400 mt-0.5">Tem prioridade sobre a geocodificação por endereço</p>
    </div>

    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Observações</label>
      <textarea name="comments" rows="3"
                placeholder="Notas pessoais sobre este imóvel..."
                class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm focus:ring-1 focus:ring-blue-400 focus:outline-none resize-none">{{ imovel.comments or '' }}</textarea>
    </div>

    {% if imovel.lat and imovel.lng %}
    <p class="text-xs text-gray-400">
      📍 Coordenadas: {{ "%.6f"|format(imovel.lat) }}, {{ "%.6f"|format(imovel.lng) }}
    </p>
    {% endif %}

    <div class="flex gap-2 justify-end pt-1">
      <button type="button"
              hx-get="/partials/imovel/{{ imovel.id }}"
              hx-target="#detalhe-panel"
              hx-swap="innerHTML"
              class="px-3 py-1.5 text-sm text-gray-600 border border-gray-300 rounded hover:bg-gray-50">
        Cancelar
      </button>
      <button type="submit"
              class="px-3 py-1.5 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 font-medium">
        Salvar
      </button>
    </div>
  </form>
</div>
