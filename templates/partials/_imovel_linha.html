<tr id="imovel-{{ imovel.id }}"
    class="border-b border-gray-100 hover:bg-blue-50 cursor-pointer transition-colors"
    hx-get="/partials/imovel/{{ imovel.id }}"
    hx-target="#detalhe-panel"
    hx-swap="innerHTML">
  <td class="py-2 pr-3">
    <div class="font-medium text-gray-800 truncate max-w-[200px]">{{ imovel.title or imovel.category or "—" }}</div>
    <div class="text-xs text-gray-400">{{ imovel.category or "" }}</div>
  </td>
  <td class="py-2 pr-3 text-gray-600 text-xs">{{ imovel.neighborhood or "—" }}</td>
  <td class="py-2 pr-3 font-medium text-gray-800">
    {% if imovel.price %}R$ {{ "{:,.0f}".format(imovel.price).replace(",", ".") }}{% else %}—{% endif %}
  </td>
  <td class="py-2 pr-3 text-gray-500 text-xs truncate max-w-[120px]">{{ imovel.source_site }}</td>
  <td class="py-2" onclick="event.stopPropagation()">
    <form hx-post="/partials/imovel/{{ imovel.id }}/status"
          hx-target="#imovel-{{ imovel.id }}"
          hx-swap="outerHTML">
      <select name="status"
              onchange="this.form.requestSubmit()"
              class="border border-gray-200 rounded px-1 py-0.5 text-xs bg-white cursor-pointer hover:border-blue-400">
        {% for s in statuses %}
        <option value="{{ s }}" {% if imovel.status == s %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>
    </form>
  </td>
</tr>
